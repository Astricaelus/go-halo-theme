<!doctype html>
<html
  data-overlayscrollbars-initialize
  lang="zh"
  th:fragment="html (content)"
  th:attr="data-theme-default=${theme.config.global.themeMode ?: 'system'},data-theme-preference=${theme.config.global.themeMode ?: 'system'}"
>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title
      th:text="${#strings.isEmpty(title)} ?
        (${#strings.isEmpty(site.subtitle)} ? ${site.title} : (${site.title} + ' - ' + ${site.subtitle}))
        : ${title}"
    >
      默认标题
    </title>

    <!-- 主题模式引导脚本：一定要在样式加载前预先给 <html> 加 dark 类，避免白闪 -->
    <script th:inline="javascript">
      (function () {
        try {
          var root = document.documentElement;
          var defaultMode = root.getAttribute("data-theme-default") || "system";
          var storageKey = "go-halo-theme-mode";
          var modes = ["system", "light", "dark"];
          var mq = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
          var labels = {
            system: "跟随系统",
            light: "白色",
            dark: "黑色",
          };
          var icons = {
            system:
              '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4a8 8 0 1 0 8 8" opacity="0.4"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path></svg>',
            light:
              '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="4" stroke-width="2"></circle><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v2.5M12 19.5V22M4.93 4.93l1.77 1.77M17.3 17.3l1.77 1.77M2 12h2.5M19.5 12H22M4.93 19.07l1.77-1.77M17.3 6.7l1.77-1.77"></path></svg>',
            dark: '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.742 13.045a8.088 8.088 0 0 1-9.787-9.787 1 1 0 0 0-1.258-1.258A10.002 10.002 0 1 0 22 14.303a1 1 0 0 0-1.258-1.258Z"></path></svg>',
          };
          function isValidMode(mode) {
            return mode === "system" || mode === "light" || mode === "dark";
          }
          function resolveMode() {
            try {
              var savedMode = window.localStorage.getItem(storageKey);
              if (isValidMode(savedMode)) {
                return savedMode;
              }
            } catch (e) {}
            return isValidMode(defaultMode) ? defaultMode : "system";
          }
          function apply(mode) {
            var isDark = mode === "dark" || (mode === "system" && !!(mq && mq.matches));
            root.setAttribute("data-theme-preference", mode);
            root.setAttribute("data-color-mode", isDark ? "dark" : "light");
            if (isDark) {
              root.classList.add("dark");
            } else {
              root.classList.remove("dark");
            }
          }
          function updateButtons(mode) {
            var buttons = document.querySelectorAll("[data-theme-toggle]");
            buttons.forEach(function (button) {
              button.setAttribute("data-theme-mode", mode);
              button.setAttribute("aria-label", "切换主题，当前：" + labels[mode]);
              button.setAttribute("title", "切换主题，当前：" + labels[mode]);
              var icon = button.querySelector(".theme-toggle-icon");
              if (icon) {
                icon.innerHTML = icons[mode];
              }
            });
          }
          function setMode(mode) {
            if (!isValidMode(mode)) mode = "system";
            try {
              window.localStorage.setItem(storageKey, mode);
            } catch (e) {}
            apply(mode);
            updateButtons(mode);
          }
          function cycleMode() {
            var currentMode = root.getAttribute("data-theme-preference") || resolveMode();
            var currentIndex = modes.indexOf(currentMode);
            var nextMode = modes[(currentIndex + 1) % modes.length];
            setMode(nextMode);
          }
          window.__haloTheme = {
            setMode: setMode,
            cycleMode: cycleMode,
            syncButtons: function () {
              updateButtons(root.getAttribute("data-theme-preference") || resolveMode());
            },
          };
          var initialMode = resolveMode();
          apply(initialMode);
          document.addEventListener("DOMContentLoaded", function () {
            updateButtons(root.getAttribute("data-theme-preference") || initialMode);
          });
          if (mq) {
            var handler = function () {
              if ((root.getAttribute("data-theme-preference") || initialMode) === "system") {
                apply("system");
                updateButtons("system");
              }
            };
            if (mq.addEventListener) mq.addEventListener("change", handler);
            else if (mq.addListener) mq.addListener(handler);
          }
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" th:href="@{/assets/dist/main.css?v={version}(version=${theme.spec.version})}" />
    <script th:src="@{/assets/dist/main.iife.js?v={version}(version=${theme.spec.version})}" defer></script>
  </head>

  <body data-overlayscrollbars-initialize class="os-scroll min-full-height flex h-full w-full flex-col">
    <!-- 网站背景 -->
    <div
      id="global-background"
      class="fixed left-0 top-0 z-[-999] h-full w-full !bg-cover !bg-center !bg-no-repeat"
      th:style="|background: ${theme.config.global.background};|"
    ></div>

    <!-- 头部 -->
    <th:block th:replace="~{modules/header/header :: header(isHomePage=${isHomePage})}" />

    <!-- 可选内容块 -->
    <div th:if="${contentBefore != null}">
      <th:block th:replace="${contentBefore}" />
    </div>

    <!-- 主体内容 -->
    <div class="max-container-width m-auto flex w-full flex-1 flex-col gap-4 p-4 max-sm:gap-3 max-sm:p-3">
      <th:block th:replace="${content}" />
    </div>

    <!-- 底部 -->
    <th:block th:replace="~{modules/footer}" />

    <!-- 滚动到顶部按钮 -->
    <button
      type="button"
      id="btn-scroll-to-top"
      aria-label="回到顶部"
      class="pointer-events-none fixed bottom-8 right-8 z-50 flex items-center justify-center rounded-full bg-gray-500 p-3 opacity-0 transition-all duration-300 hover:opacity-80 lg:bottom-10 lg:right-10"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="h-6 w-6 text-white"
      >
        <path d="M18 15 l-6-6-6 6" />
      </svg>
    </button>
  </body>
</html>
